# PICOM CONFIGURATION By Platter99 & Antigravity
# Optimizado para rendimiento, esquinas redondeadas y desenfoque dual_kawase.

#################################
# Backend y Rendimiento
#################################
backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
glx-no-rebind-pixmap = true;
glx-use-copysubbuffermesa = false;
use-damage = true;
vsync = true;

mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;

#################################
# Sombras (Shadows)
#################################
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.50;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Polybar'",
    "class_g = 'i3-frame'",
    "class_g = 'slop'",
    "class_g = 'Maim'",
    "_GTK_FRAME_EXTENTS@:c"
];

#################################
# Fading (Desvanecimiento)
#################################
fading = true;
fade-delta = 5;
fade-in-step = 0.08;
fade-out-step = 0.04;
no-fading-openclose = false;
fade-exclude = [ ];

#################################
# Opacidad y Reglas
#################################
active-opacity = 1.0;
inactive-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
    "50:class_g = 'Kitty' && focused",
    "40:class_g = 'Kitty' && !focused",
    "50:class_g = 'Alacritty' && focused",
    "40:class_g = 'Alacritty' && !focused",
    "85:class_g = 'Rofi'"
];

#################################
# Esquinas Redondeadas
#################################
corner-radius = 8;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Polybar'",
    "class_g = 'i3-frame'",
    "class_g = 'slop'",
    "class_g = 'Maim'"
];

#################################
# Desenfoque (Blur)
#################################
blur: {
  method = "dual_kawase";
  strength = 9;
  background = true;
  background-frame = false;
  background-fixed = false;
};

blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Polybar'",
    "class_g = 'slop'",
    "class_g = 'Maim'",
    "_GTK_FRAME_EXTENTS@:c"
];

#################################
# Animaciones (Picom v12+)
#################################
animations = (
  {
    # Ventanas que se ABREN: se expanden suavemente desde el centro
    triggers = ["open"];
    preset = "appear";
    duration = 0.2;
  },
  {
    # Ventanas que se CIERRAN: se contraen suavemente hacia el centro
    triggers = ["close"];
    preset = "disappear";
    duration = 0.15;
  },
  {
    # Cambio de Escritorio / Mostrar ventanas: Estilo macOS (Fade y suave expansión)
    triggers = ["show"];
    preset = "appear";
    duration = 0.18;
  },
  {
    # Cambio de Escritorio / Ocultar ventanas: Estilo macOS (Desvanecimiento elegante)
    triggers = ["hide"];
    preset = "disappear";
    duration = 0.15;
  }
);

